<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fantome Chasseur</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #10121a;
      --panel: #181b26;
      --panel-2: #202432;
      --wall: #2f67ff;
      --wall-edge: #82a4ff;
      --maze: #070914;
      --pellet: #ffe7a1;
      --pacman: #ffd93d;
      --player: #37f0ff;
      --red: #ff4d5f;
      --pink: #ff70d1;
      --orange: #ffb340;
      --text: #f7f7fb;
      --muted: #9ea5bd;
      --win: #54f2a6;
      --lose: #ff6479;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 14% 18%, rgba(55, 240, 255, 0.12), transparent 28rem),
        radial-gradient(circle at 85% 84%, rgba(255, 179, 64, 0.13), transparent 30rem),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button {
      color: inherit;
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      width: 100%;
      height: 100%;
      min-width: 300px;
    }

    .hud {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: clamp(0.6rem, 2vw, 1.2rem);
      align-items: center;
      padding: clamp(0.7rem, 2vw, 1.1rem) clamp(0.8rem, 3vw, 2rem);
      background: linear-gradient(180deg, rgba(24, 27, 38, 0.96), rgba(24, 27, 38, 0.72));
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .brand {
      display: flex;
      min-width: 0;
      align-items: center;
      gap: 0.7rem;
    }

    .mark {
      width: 2.1rem;
      height: 2.1rem;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: clamp(1.1rem, 3vw, 1.7rem);
      line-height: 1.05;
      font-weight: 800;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 0.5rem;
    }

    .stat {
      display: grid;
      gap: 0.08rem;
      min-width: 5.6rem;
      padding: 0.48rem 0.64rem;
      background: var(--panel-2);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
    }

    .stat span {
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .stat strong {
      font-size: 1rem;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 0.42rem;
      margin-left: 0.2rem;
    }

    .icon-button {
      display: grid;
      width: 2.4rem;
      height: 2.4rem;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: #252a3b;
      cursor: pointer;
    }

    .icon-button:hover,
    .icon-button:focus-visible {
      border-color: rgba(55, 240, 255, 0.62);
      outline: none;
      background: #30374d;
    }

    .icon-button svg {
      width: 1.18rem;
      height: 1.18rem;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .stage-wrap {
      --stage-reserve: 7.4rem;
      position: relative;
      display: grid;
      min-height: 0;
      padding: clamp(0.55rem, 2vw, 1rem);
      place-items: center;
    }

    .stage {
      width: min(96vw, calc((100vh - var(--stage-reserve)) * 21 / 23));
      max-width: 820px;
      aspect-ratio: 21 / 23;
      border-radius: 8px;
      background: var(--maze);
      box-shadow:
        0 1.3rem 3rem rgba(0, 0, 0, 0.36),
        inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      touch-action: none;
    }

    .stage:focus {
      outline: 2px solid rgba(55, 240, 255, 0.65);
      outline-offset: 2px;
    }

    #game {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 8px;
    }

    .wall {
      fill: var(--wall);
      stroke: var(--wall-edge);
      stroke-width: 0.8;
    }

    .pellet {
      fill: var(--pellet);
    }

    .power-pellet {
      fill: #ffffff;
      stroke: #ffb340;
      stroke-width: 1.3;
    }

    .entity {
      transition: transform 112ms linear;
    }

    .ghost-body {
      stroke: rgba(255, 255, 255, 0.62);
      stroke-width: 1.2;
      stroke-linejoin: round;
    }

    .player-ring {
      fill: none;
      stroke: rgba(55, 240, 255, 0.72);
      stroke-width: 1.6;
      stroke-dasharray: 5 3;
      animation: ring-spin 2.6s linear infinite;
      transform-origin: center;
    }

    .ghost-eye {
      fill: #fff;
    }

    .ghost-pupil {
      fill: #1a2137;
    }

    .crown {
      fill: #fff6a7;
      stroke: #6defff;
      stroke-width: 0.9;
      stroke-linejoin: round;
    }

    .pacman {
      fill: var(--pacman);
      stroke: #fff1a6;
      stroke-width: 1.1;
      stroke-linejoin: round;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      opacity: 0;
      transform: translateY(0.6rem);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .overlay.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .round-card {
      display: grid;
      gap: 0.28rem;
      width: min(86vw, 24rem);
      padding: 1rem 1.1rem;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      background: rgba(16, 18, 26, 0.84);
      box-shadow: 0 1rem 2.4rem rgba(0, 0, 0, 0.35);
      text-align: center;
      backdrop-filter: blur(12px);
    }

    .round-card strong {
      font-size: clamp(1.15rem, 5vw, 2rem);
      line-height: 1.05;
    }

    .round-card span {
      color: var(--muted);
      font-size: clamp(0.9rem, 2.6vw, 1.05rem);
    }

    .mobile-pad {
      position: absolute;
      right: clamp(0.8rem, 3vw, 1.5rem);
      bottom: clamp(0.8rem, 3vw, 1.5rem);
      display: none;
      grid-template-columns: repeat(3, 2.85rem);
      grid-template-rows: repeat(3, 2.85rem);
      gap: 0.28rem;
      pointer-events: auto;
    }

    .pad-button {
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(37, 42, 59, 0.86);
      color: var(--text);
      cursor: pointer;
      touch-action: manipulation;
    }

    .pad-button svg {
      width: 1.18rem;
      height: 1.18rem;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .pad-button[data-dir="up"] {
      grid-column: 2;
      grid-row: 1;
    }

    .pad-button[data-dir="left"] {
      grid-column: 1;
      grid-row: 2;
    }

    .pad-button[data-dir="right"] {
      grid-column: 3;
      grid-row: 2;
    }

    .pad-button[data-dir="down"] {
      grid-column: 2;
      grid-row: 3;
    }

    @keyframes ring-spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 700px) {
      .stage-wrap {
        --stage-reserve: 12.2rem;
      }

      .hud {
        grid-template-columns: 1fr;
        align-items: start;
      }

      .stats {
        justify-content: stretch;
      }

      .stat {
        min-width: 0;
        flex: 1 1 4.8rem;
      }

      .toolbar {
        margin-left: auto;
      }

      .stage {
        width: min(96vw, calc((100vh - var(--stage-reserve)) * 21 / 23));
      }

      .mobile-pad {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="hud">
      <div class="brand" aria-label="Fantome Chasseur">
        <svg class="mark" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#37f0ff" stroke="#ffffff" stroke-width="2" d="M8 38V20C8 11.2 15.2 5 24 5s16 6.2 16 15v18l-5.2-4.6L29.6 38 24 33.4 18.4 38l-5.2-4.6L8 38Z"/>
          <circle cx="18" cy="22" r="4.4" fill="#fff"/>
          <circle cx="30" cy="22" r="4.4" fill="#fff"/>
          <circle cx="19.6" cy="22.4" r="1.9" fill="#1a2137"/>
          <circle cx="31.6" cy="22.4" r="1.9" fill="#1a2137"/>
          <path fill="#fff6a7" stroke="#6defff" stroke-width="1.4" d="M16 10.5 20 5l4 5.5L28 5l4 5.5V15H16z"/>
        </svg>
        <h1>Fantome Chasseur</h1>
      </div>
      <div class="stats" aria-live="polite">
        <div class="stat"><span>Score</span><strong id="score">0</strong></div>
        <div class="stat"><span>Manche</span><strong id="round">1</strong></div>
        <div class="stat"><span>Dernier</span><strong id="last">0</strong></div>
        <div class="toolbar">
          <button class="icon-button" id="pause" type="button" aria-label="Pause">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 5v14M15 5v14"/></svg>
          </button>
          <button class="icon-button" id="restart" type="button" aria-label="Relancer">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 7v6h-6"/><path d="M20 13a8 8 0 1 1-2.3-5.7"/></svg>
          </button>
        </div>
      </div>
    </header>

    <section class="stage-wrap">
      <div class="stage" id="stage" tabindex="0" aria-label="Zone de jeu">
        <svg id="game" role="img" aria-label="Labyrinthe de Fantome Chasseur"></svg>
      </div>
      <div class="overlay" id="overlay">
        <div class="round-card">
          <strong id="result-title">Pret</strong>
          <span id="result-detail">0 point</span>
        </div>
      </div>
      <div class="mobile-pad" aria-label="Directions">
        <button class="pad-button" data-dir="up" type="button" aria-label="Haut">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m18 15-6-6-6 6"/></svg>
        </button>
        <button class="pad-button" data-dir="left" type="button" aria-label="Gauche">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <button class="pad-button" data-dir="right" type="button" aria-label="Droite">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
        </button>
        <button class="pad-button" data-dir="down" type="button" aria-label="Bas">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
        </button>
      </div>
    </section>
  </main>

  <script>
    const SVG_NS = "http://www.w3.org/2000/svg";
    const TILE = 24;
    const TICK_MS = 118;

    const rawMap = [
      "#####################",
      "#.........#.........#",
      "#.###.###.#.###.###.#",
      "#.#.....#...#.....#.#",
      "#.#.###.#####.###.#.#",
      "#.....#...#...#.....#",
      "#####.###.#.###.#####",
      "#.........P.........#",
      "#.###.#.#####.#.###.#",
      "#.....#...#...#.....#",
      "###.#####.#.#####.###",
      "#.....#..ABC..#.....#",
      "#.###.#.#####.#.###.#",
      "#...#.....G.....#...#",
      "#.###.#.#####.#.###.#",
      "#.....#...#...#.....#",
      "###.#####.#.#####.###",
      "#.....#.......#.....#",
      "#.###.#.#####.#.###.#",
      "#.#.....#...#.....#.#",
      "#.###.###.#.###.###.#",
      "#.........#.........#",
      "#####################"
    ];

    const dirs = [
      { name: "left", dx: -1, dy: 0 },
      { name: "right", dx: 1, dy: 0 },
      { name: "up", dx: 0, dy: -1 },
      { name: "down", dx: 0, dy: 1 }
    ];

    const dirByName = Object.fromEntries(dirs.map((dir) => [dir.name, dir]));
    const reverse = { left: "right", right: "left", up: "down", down: "up" };

    const stage = document.querySelector("#stage");
    const game = document.querySelector("#game");
    const scoreEl = document.querySelector("#score");
    const roundEl = document.querySelector("#round");
    const lastEl = document.querySelector("#last");
    const overlay = document.querySelector("#overlay");
    const resultTitle = document.querySelector("#result-title");
    const resultDetail = document.querySelector("#result-detail");
    const pauseButton = document.querySelector("#pause");
    const restartButton = document.querySelector("#restart");

    let map;
    let pellets;
    let pelletLayer;
    let entityLayer;
    let pacman;
    let player;
    let ghosts;
    let score = 0;
    let round = 1;
    let lastPoints = 0;
    let queuedDir = dirByName.left;
    let tickTimer = 0;
    let roundActive = true;
    let paused = false;
    let mouthOpen = true;
    let stepCount = 0;

    function svgEl(tag, attrs = {}) {
      const el = document.createElementNS(SVG_NS, tag);
      for (const [key, value] of Object.entries(attrs)) {
        el.setAttribute(key, value);
      }
      return el;
    }

    function parseMap() {
      const starts = {};
      const clean = rawMap.map((row, y) => row.split("").map((cell, x) => {
        if ("PGABC".includes(cell)) {
          starts[cell] = { x, y };
          return " ";
        }
        return cell;
      }));

      return { clean, starts };
    }

    function cellKey(x, y) {
      return `${x},${y}`;
    }

    function isWall(x, y) {
      return y < 0 || y >= map.length || x < 0 || x >= map[0].length || map[y][x] === "#";
    }

    function isOpen(x, y) {
      return !isWall(x, y);
    }

    function openDirs(entity, keepReverse = true) {
      return dirs.filter((dir) => {
        const blockedReverse = !keepReverse && entity.dir && reverse[entity.dir.name] === dir.name;
        return !blockedReverse && isOpen(entity.x + dir.dx, entity.y + dir.dy);
      });
    }

    function resetRound(showStart = false) {
      const parsed = parseMap();
      map = parsed.clean;
      pellets = new Map();
      queuedDir = dirByName.left;
      roundActive = true;
      mouthOpen = true;
      stepCount = 0;

      map.forEach((row, y) => {
        row.forEach((cell, x) => {
          if (cell === ".") {
            pellets.set(cellKey(x, y), { x, y });
          }
        });
      });

      pacman = {
        type: "pacman",
        id: "pacman",
        x: parsed.starts.P.x,
        y: parsed.starts.P.y,
        dir: dirByName.left,
        group: null
      };

      player = {
        type: "ghost",
        id: "player",
        name: "Spectre bleu",
        color: "var(--player)",
        x: parsed.starts.G.x,
        y: parsed.starts.G.y,
        dir: dirByName.left,
        player: true,
        group: null
      };

      ghosts = [
        player,
        {
          type: "ghost",
          id: "red",
          name: "Rouge",
          color: "var(--red)",
          x: parsed.starts.A.x,
          y: parsed.starts.A.y,
          dir: dirByName.right,
          mood: "direct",
          stride: 3,
          phase: 0,
          group: null
        },
        {
          type: "ghost",
          id: "pink",
          name: "Rose",
          color: "var(--pink)",
          x: parsed.starts.B.x,
          y: parsed.starts.B.y,
          dir: dirByName.up,
          mood: "ambush",
          stride: 3,
          phase: 1,
          group: null
        },
        {
          type: "ghost",
          id: "orange",
          name: "Orange",
          color: "var(--orange)",
          x: parsed.starts.C.x,
          y: parsed.starts.C.y,
          dir: dirByName.down,
          mood: "wander",
          stride: 4,
          phase: 2,
          group: null
        }
      ];

      renderBoard();
      renderEntities();
      updateHud();
      overlay.classList.toggle("visible", showStart);
      if (showStart) {
        resultTitle.textContent = "Chasse ouverte";
        resultDetail.textContent = "Manche " + round;
        setTimeout(() => overlay.classList.remove("visible"), 720);
      }
    }

    function renderBoard() {
      game.replaceChildren();
      game.setAttribute("viewBox", `0 0 ${rawMap[0].length * TILE} ${rawMap.length * TILE}`);

      const bg = svgEl("rect", {
        width: rawMap[0].length * TILE,
        height: rawMap.length * TILE,
        rx: 8,
        fill: "var(--maze)"
      });
      game.append(bg);

      const wallLayer = svgEl("g");
      pelletLayer = svgEl("g");
      entityLayer = svgEl("g");

      map.forEach((row, y) => {
        row.forEach((cell, x) => {
          if (cell === "#") {
            wallLayer.append(svgEl("rect", {
              class: "wall",
              x: x * TILE + 1.5,
              y: y * TILE + 1.5,
              width: TILE - 3,
              height: TILE - 3,
              rx: 5
            }));
          }
        });
      });

      game.append(wallLayer, pelletLayer, entityLayer);
      drawPellets();
    }

    function drawPellets() {
      pelletLayer.replaceChildren();
      for (const pellet of pellets.values()) {
        const power = (pellet.x === 1 && pellet.y === 1)
          || (pellet.x === rawMap[0].length - 2 && pellet.y === 1)
          || (pellet.x === 1 && pellet.y === rawMap.length - 2)
          || (pellet.x === rawMap[0].length - 2 && pellet.y === rawMap.length - 2);

        pelletLayer.append(svgEl("circle", {
          class: power ? "power-pellet" : "pellet",
          cx: pellet.x * TILE + TILE / 2,
          cy: pellet.y * TILE + TILE / 2,
          r: power ? 4.2 : 2.45
        }));
      }
    }

    function renderEntities() {
      entityLayer.replaceChildren();
      pacman.group = makePacman();
      entityLayer.append(pacman.group);
      ghosts.forEach((ghost) => {
        ghost.group = makeGhost(ghost);
        entityLayer.append(ghost.group);
      });
      updateEntityPositions();
    }

    function makeGhost(ghost) {
      const group = svgEl("g", { class: "entity" });
      if (ghost.player) {
        group.append(svgEl("circle", {
          class: "player-ring",
          cx: TILE / 2,
          cy: TILE / 2,
          r: 11.3
        }));
      }

      group.append(svgEl("path", {
        class: "ghost-body",
        fill: ghost.color,
        d: "M5 20V11.2C5 5.9 8.8 2.6 12 2.6s7 3.3 7 8.6V20l-3-2.7L13.7 20 12 18.2 10.3 20 8 17.3 5 20Z"
      }));

      group.append(svgEl("circle", { class: "ghost-eye", cx: 9, cy: 10.4, r: 3 }));
      group.append(svgEl("circle", { class: "ghost-eye", cx: 15, cy: 10.4, r: 3 }));
      group.append(svgEl("circle", { class: "ghost-pupil", cx: 10, cy: 10.8, r: 1.25 }));
      group.append(svgEl("circle", { class: "ghost-pupil", cx: 16, cy: 10.8, r: 1.25 }));

      if (ghost.player) {
        group.append(svgEl("path", {
          class: "crown",
          d: "M7 5.6 9.2 1.7 12 5.2 14.8 1.7 17 5.6v2.5H7Z"
        }));
      }

      return group;
    }

    function makePacman() {
      const group = svgEl("g", { class: "entity" });
      group.append(svgEl("path", { class: "pacman" }));
      group.append(svgEl("circle", { cx: 12, cy: 6.4, r: 1.25, fill: "#2b1e00" }));
      return group;
    }

    function pacmanPath(dir, open) {
      const mouth = open ? Math.PI / 5.1 : Math.PI / 14;
      const angleByDir = {
        right: 0,
        down: Math.PI / 2,
        left: Math.PI,
        up: -Math.PI / 2
      };
      const facing = angleByDir[dir.name];
      const start = facing + mouth;
      const end = facing + Math.PI * 2 - mouth;
      const r = 9.4;
      const cx = TILE / 2;
      const cy = TILE / 2;
      const sx = cx + Math.cos(start) * r;
      const sy = cy + Math.sin(start) * r;
      const ex = cx + Math.cos(end) * r;
      const ey = cy + Math.sin(end) * r;
      return `M ${cx} ${cy} L ${sx.toFixed(2)} ${sy.toFixed(2)} A ${r} ${r} 0 1 1 ${ex.toFixed(2)} ${ey.toFixed(2)} Z`;
    }

    function updateEntityPositions() {
      const all = [pacman, ...ghosts];
      all.forEach((entity) => {
        entity.group.setAttribute("transform", `translate(${entity.x * TILE}, ${entity.y * TILE})`);
      });
      pacman.group.querySelector(".pacman").setAttribute("d", pacmanPath(pacman.dir, mouthOpen));
    }

    function updateHud() {
      scoreEl.textContent = score;
      roundEl.textContent = round;
      lastEl.textContent = lastPoints > 0 ? `+${lastPoints}` : "0";
    }

    function moveEntity(entity, dir) {
      if (!dir || !isOpen(entity.x + dir.dx, entity.y + dir.dy)) return false;
      entity.x += dir.dx;
      entity.y += dir.dy;
      entity.dir = dir;
      return true;
    }

    function movePlayer() {
      if (moveEntity(player, queuedDir)) return;
      moveEntity(player, player.dir);
    }

    function distanceMap(fromX, fromY) {
      const distances = new Map();
      const queue = [{ x: fromX, y: fromY, d: 0 }];
      distances.set(cellKey(fromX, fromY), 0);

      for (let index = 0; index < queue.length; index++) {
        const current = queue[index];
        dirs.forEach((dir) => {
          const nx = current.x + dir.dx;
          const ny = current.y + dir.dy;
          const key = cellKey(nx, ny);
          if (!isOpen(nx, ny) || distances.has(key)) return;
          distances.set(key, current.d + 1);
          queue.push({ x: nx, y: ny, d: current.d + 1 });
        });
      }

      return distances;
    }

    function nearestPelletDistance(x, y) {
      if (pellets.size === 0) return 0;
      const distances = distanceMap(x, y);
      let best = Infinity;
      for (const pellet of pellets.values()) {
        const distance = distances.get(cellKey(pellet.x, pellet.y));
        if (distance !== undefined && distance < best) best = distance;
      }
      return Number.isFinite(best) ? best : 40;
    }

    function nearestGhostDistance(x, y) {
      const distances = distanceMap(x, y);
      let best = Infinity;
      ghosts.forEach((ghost) => {
        const distance = distances.get(cellKey(ghost.x, ghost.y));
        if (distance !== undefined && distance < best) best = distance;
      });
      return Number.isFinite(best) ? best : 40;
    }

    function ghostThreat(x, y) {
      let threat = 0;
      ghosts.forEach((ghost) => {
        const distance = Math.abs(ghost.x - x) + Math.abs(ghost.y - y);
        if (distance === 0) threat += 120;
        if (distance === 1) threat += 32;
        if (distance === 2) threat += 9;
      });
      return threat;
    }

    function escapeOptions(x, y) {
      return dirs.filter((dir) => isOpen(x + dir.dx, y + dir.dy) && ghostThreat(x + dir.dx, y + dir.dy) < 32).length;
    }

    function choosePacmanDir() {
      const choices = openDirs(pacman, false);
      const fallback = choices.length ? choices : openDirs(pacman, true);
      let best = fallback[0] || pacman.dir;
      let bestScore = -Infinity;

      fallback.forEach((dir) => {
        const nx = pacman.x + dir.dx;
        const ny = pacman.y + dir.dy;
        const danger = nearestGhostDistance(nx, ny);
        const food = nearestPelletDistance(nx, ny);
        const keepsGoing = dir.name === pacman.dir.name ? 0.6 : 0;
        const exits = escapeOptions(nx, ny);
        const closePenalty = danger <= 2 ? (3 - danger) * 12 : 0;
        const scoreValue = danger * 3.2 + exits * 2.1 - food * 0.74 + keepsGoing - closePenalty - ghostThreat(nx, ny) + Math.random() * 0.7;
        if (scoreValue > bestScore) {
          best = dir;
          bestScore = scoreValue;
        }
      });

      return best;
    }

    function targetForGhost(ghost) {
      if (ghost.mood === "ambush") {
        const tx = pacman.x + pacman.dir.dx * 3;
        const ty = pacman.y + pacman.dir.dy * 3;
        if (isOpen(tx, ty)) return { x: tx, y: ty };
      }

      if (ghost.mood === "wander" && Math.random() < 0.32) {
        const open = [];
        map.forEach((row, y) => row.forEach((cell, x) => {
          if (cell !== "#") open.push({ x, y });
        }));
        return open[Math.floor(Math.random() * open.length)];
      }

      return { x: pacman.x, y: pacman.y };
    }

    function chooseGhostDir(ghost) {
      const choices = openDirs(ghost, false);
      const fallback = choices.length ? choices : openDirs(ghost, true);
      const target = targetForGhost(ghost);
      const distances = distanceMap(target.x, target.y);
      let best = fallback[0] || ghost.dir;
      let bestScore = Infinity;

      fallback.forEach((dir) => {
        const nx = ghost.x + dir.dx;
        const ny = ghost.y + dir.dy;
        const distance = distances.get(cellKey(nx, ny));
        const hesitation = ghost.player ? 0 : Math.random() * 1.15;
        const scoreValue = (distance ?? 99) + hesitation;
        if (scoreValue < bestScore) {
          best = dir;
          bestScore = scoreValue;
        }
      });

      return best;
    }

    function collectPellet() {
      const key = cellKey(pacman.x, pacman.y);
      if (!pellets.has(key)) return;
      pellets.delete(key);
      drawPellets();
      if (pellets.size === 0) {
        finishRound("pacman");
      }
    }

    function findCatcher() {
      if (player.x === pacman.x && player.y === pacman.y) return player;
      return ghosts.find((ghost) => !ghost.player && ghost.x === pacman.x && ghost.y === pacman.y);
    }

    function checkCatch() {
      const catcher = findCatcher();
      if (!catcher) return false;
      finishRound(catcher.player ? "player" : "other", catcher);
      return true;
    }

    function finishRound(result, catcher = null) {
      if (!roundActive) return;
      roundActive = false;
      if (result === "player") {
        lastPoints = 10;
        resultTitle.textContent = "Capture directe";
        resultDetail.textContent = "+10 points";
      } else if (result === "other") {
        lastPoints = 5;
        resultTitle.textContent = `${catcher.name} attrape Pacman`;
        resultDetail.textContent = "+5 points";
      } else {
        lastPoints = 0;
        resultTitle.textContent = "Pacman nettoie le labyrinthe";
        resultDetail.textContent = "0 point";
      }

      score += lastPoints;
      round += 1;
      updateHud();
      overlay.classList.add("visible");
      window.setTimeout(() => {
        overlay.classList.remove("visible");
        resetRound();
      }, 1250);
    }

    function tick() {
      if (!roundActive || paused) return;
      stepCount += 1;
      mouthOpen = !mouthOpen;
      movePlayer();
      checkCatch();
      if (!roundActive) {
        updateEntityPositions();
        return;
      }

      moveEntity(pacman, choosePacmanDir());
      collectPellet();
      checkCatch();
      if (!roundActive) {
        updateEntityPositions();
        return;
      }

      ghosts.filter((ghost) => !ghost.player && shouldMoveRival(ghost)).forEach((ghost) => {
        moveEntity(ghost, chooseGhostDir(ghost));
      });
      checkCatch();
      updateEntityPositions();
    }

    function shouldMoveRival(ghost) {
      return (stepCount + ghost.phase) % ghost.stride !== 0;
    }

    function focusStage() {
      stage.focus({ preventScroll: true });
    }

    function setDirection(name) {
      if (!dirByName[name]) return;
      focusStage();
      queuedDir = dirByName[name];
    }

    function directionFromEvent(event) {
      const key = String(event.key || "").toLowerCase();
      const codeMap = {
        ArrowLeft: "left",
        ArrowRight: "right",
        ArrowUp: "up",
        ArrowDown: "down",
        KeyA: "left",
        KeyD: "right",
        KeyW: "up",
        KeyS: "down",
        KeyQ: "left",
        KeyZ: "up"
      };
      const keyMap = {
        arrowleft: "left",
        arrowright: "right",
        arrowup: "up",
        arrowdown: "down",
        a: "left",
        d: "right",
        w: "up",
        s: "down",
        q: "left",
        z: "up"
      };
      return codeMap[event.code] || keyMap[key];
    }

    function setPaused(value) {
      paused = value;
      pauseButton.setAttribute("aria-label", paused ? "Reprendre" : "Pause");
      pauseButton.innerHTML = paused
        ? '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7Z"/></svg>'
        : '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 5v14M15 5v14"/></svg>';
    }

    document.addEventListener("keydown", (event) => {
      const direction = directionFromEvent(event);
      if (direction) {
        event.preventDefault();
        setDirection(direction);
      } else if (event.key === " ") {
        event.preventDefault();
        setPaused(!paused);
      }
    }, { capture: true });

    document.querySelectorAll(".pad-button").forEach((button) => {
      button.addEventListener("pointerdown", () => setDirection(button.dataset.dir));
    });

    stage.addEventListener("pointerdown", focusStage);
    pauseButton.addEventListener("click", () => setPaused(!paused));
    restartButton.addEventListener("click", () => {
      lastPoints = 0;
      resetRound(true);
      updateHud();
    });

    resetRound(true);
    focusStage();
    tickTimer = window.setInterval(tick, TICK_MS);
  </script>
</body>
</html>
